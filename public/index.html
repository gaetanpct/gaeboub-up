<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reach Up</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Accueil et salon d'attente : présentation classique, centrée -->
  <main class="app">
    <h1>Reach Up</h1>

    <!-- Écran d'accueil : choisir un pseudo, créer ou rejoindre un salon -->
    <section id="screen-home" class="screen">
      <label for="input-name">Ton pseudo</label>
      <input id="input-name" type="text" placeholder="Ton pseudo" maxlength="20" />

      <button id="btn-create" class="btn-primary">Créer une partie</button>

      <p class="or-separator">— ou —</p>

      <div class="join-row">
        <input id="input-code" type="text" placeholder="Code du salon" maxlength="4" />
        <button id="btn-join">Rejoindre</button>
      </div>

      <p id="home-error" class="error-text"></p>

      <p class="footer-link">
        <a href="test-phase2.html">→ Tester le moteur du jeu en solo (outil de debug)</a>
      </p>
    </section>

    <!-- Écran salon d'attente -->
    <section id="screen-lobby" class="screen" hidden>
      <p class="lobby-code-line">
        Code du salon à partager : <strong id="lobby-code">----</strong>
      </p>

      <div id="lobby-players" class="players-panel"></div>

      <div class="settings-panel">
        <h3>Réglages de la partie</h3>
        <div id="settings-container"></div>
        <p class="settings-hint">Seul l'hôte peut modifier ces réglages.</p>
      </div>

      <div id="board-preview-panel" class="board-preview-panel" hidden>
        <div class="board-preview-header">
          <h3>Aperçu du plateau généré</h3>
          <button id="btn-regenerate-board" class="btn-secondary">🎲 Régénérer</button>
        </div>
        <div id="board-preview-grid" class="board-grid board-grid--preview"></div>
      </div>

      <div class="test-controls">
        <button id="btn-ready" class="btn-primary">Je suis prêt</button>
        <button id="btn-start" hidden>Démarrer la partie</button>
      </div>

      <p id="lobby-error" class="error-text"></p>
    </section>
  </main>

  <!-- Écran de jeu : mis en page à part pour tenir sur un seul écran, sans scroll -->
  <section id="screen-game" class="screen screen-game" hidden>
    <div class="game-layout">
      <div class="board-container">
        <div class="board-top-row">
          <div id="active-event-banner" class="active-event-banner" hidden></div>
          <button id="btn-toggle-sound" class="btn-sound" title="Activer/couper le son">🔊</button>
        </div>
        <div id="board-grid" class="board-grid"></div>
      </div>

      <aside class="game-sidebar">
        <div id="players-panel" class="players-panel players-panel--compact"></div>

        <div id="active-rules-panel" class="active-rules-panel" hidden>
          <span class="active-rules-label">Règles actives :</span>
          <div id="active-rules-chips" class="active-rules-chips"></div>
        </div>

        <div id="action-area" class="action-area"></div>

        <div class="secondary-actions-row">
          <button id="btn-open-properties" class="btn-icon" title="Mes propriétés">🏠</button>
          <button id="btn-open-trade" class="btn-icon" title="Échanges">🤝</button>
          <button id="btn-open-power" class="btn-icon" title="Mon pouvoir" hidden>🔮</button>
          <button id="btn-open-loans" class="btn-icon" title="Prêts &amp; Assurance" hidden>💳</button>
        </div>

        <div class="log-wrap log-wrap--compact">
          <h2 class="log-title">Journal</h2>
          <div id="log-panel" class="log-panel"></div>
        </div>
      </aside>
    </div>

    <!-- Fenêtre de gestion des propriétés (construire, hypothéquer...) -->
    <div id="properties-modal" class="modal-overlay" hidden>
      <div class="modal-box">
        <div class="modal-header">
          <h2>Mes propriétés</h2>
          <button id="btn-close-properties" class="btn-close">✕</button>
        </div>
        <p id="properties-error" class="error-text"></p>
        <div id="properties-list" class="properties-list"></div>
      </div>
    </div>

    <!-- Fenêtre d'échanges entre joueurs -->
    <div id="trade-modal" class="modal-overlay" hidden>
      <div class="modal-box">
        <div class="modal-header">
          <h2>Échanges</h2>
          <button id="btn-close-trade" class="btn-close">✕</button>
        </div>
        <p id="trade-error" class="error-text"></p>
        <div id="trade-content" class="properties-list"></div>
      </div>
    </div>

    <!-- Fenêtre du pouvoir du joueur -->
    <div id="power-modal" class="modal-overlay" hidden>
      <div class="modal-box">
        <div class="modal-header">
          <h2>Mon pouvoir</h2>
          <button id="btn-close-power" class="btn-close">✕</button>
        </div>
        <p id="power-error" class="error-text"></p>
        <div id="power-content" class="properties-list"></div>
      </div>
    </div>

    <!-- Fenêtre Prêts & Assurance -->
    <div id="loans-modal" class="modal-overlay" hidden>
      <div class="modal-box">
        <div class="modal-header">
          <h2>Prêts &amp; Assurance</h2>
          <button id="btn-close-loans" class="btn-close">✕</button>
        </div>
        <p id="loans-error" class="error-text"></p>
        <div id="loans-content" class="properties-list"></div>
      </div>
    </div>
  </section>

  <script src="/socket.io/socket.io.js"></script>
  <script src="sounds.js"></script>
  <script src="game/rules-schema.js"></script>
  <script src="game/powers.js"></script>
  <script src="game/world-events.js"></script>
  <script src="board-view.js"></script>
  <script src="game.js"></script>
</body>
</html>
